networks:
  agent-net:
    name: agent-net
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 172.28.0.0/16
          gateway: 172.28.0.1

volumes:
  qdrant-data: {}
  postgres-data: {}
  hf-cache: {}
  agent-node-modules: {}
  rag-dirty-docs: {}
  rag-clean-docs: {}
  playwright-videos: {}

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    platform: linux/arm64
    networks:
      - agent-net
    ports:
      - "6333:6333"
      - "6334:6334"
    environment:
      QDRANT__SERVICE__GRPC_ENABLE: "true"
    volumes:
      - qdrant-data:/qdrant/storage
    healthcheck:
      # qdrant image has no curl/wget/nc, but it ships bash. Use bash /dev/tcp to probe the HTTP port.
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/127.0.0.1/6333 && printf 'GET /readyz HTTP/1.0\\r\\n\\r\\n' >&3 && head -n 1 <&3 | grep -q '200'"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  postgres:
    image: postgres:16
    container_name: postgres
    platform: linux/arm64
    networks:
      - agent-net
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: agent
      POSTGRES_PASSWORD: agent
      POSTGRES_DB: agent
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agent -d agent"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  rag:
    build:
      context: ./services/rag
      dockerfile: dockerfile
    container_name: rag
    platform: linux/arm64
    networks:
      - agent-net
    ports:
      - "3009:3009"
    environment:
      PYTHONUNBUFFERED: "1"
      HF_HOME: /root/.cache/huggingface
    volumes:
      - hf-cache:/root/.cache/huggingface
      - rag-dirty-docs:/app/src/util/dirty_documents
      - rag-clean-docs:/app/src/util/clean_docs
    healthcheck:
      # python:3.11-slim has no wget/curl. Use stdlib urllib instead.
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:3009/monitor', timeout=5).status == 200 else 1)"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 180s
    depends_on:
      qdrant:
        condition: service_healthy
    restart: unless-stopped

  agent:
    build:
      context: ./services/agent
      dockerfile: Dockerfile
    container_name: agent
    platform: linux/arm64
    hostname: agent
    networks:
      - agent-net
    ports:
      - "3001:3001"
      - "9229:9229"
    # Values below merge with anything in .env; when a key exists in both,
    # `environment:` wins. That's deliberate: service-to-service URLs are
    # pinned here (they depend on the docker network), while secrets and
    # tunable constants come from .env.
    env_file:
      - .env
    environment:
      NODE_ENV: development
      RAG_URL: http://rag:3009
      QDRANT_URL: http://qdrant:6333
      PG_URL: postgres://agent:agent@postgres:5432/agent
      DISPLAY: ":99"
    volumes:
      - ./:/workspace:cached
      - agent-node-modules:/workspace/node_modules
      - playwright-videos:/workspace/.playwright-videos
    depends_on:
      qdrant:
        condition: service_healthy
      postgres:
        condition: service_healthy
      rag:
        condition: service_started
    restart: unless-stopped

  browser-viewer:
    build:
      context: ./services/browser-viewer
      dockerfile: dockerfile
    container_name: browser-viewer
    platform: linux/arm64
    networks:
      - agent-net
    ports:
      - "6080:6080"
    depends_on:
      agent:
        condition: service_started
    restart: unless-stopped

  test-webapp:
    build:
      context: ./services/test-webapp
      dockerfile: Dockerfile
    container_name: test-webapp
    platform: linux/arm64
    networks:
      - agent-net
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
    # No depends_on: the reviewer page connects out to the agent on the host
    # at :3001 via WebSocket; the webapp itself has no upstream dependency.
    # Week 1B adds real user-management pages that also live here.
    restart: unless-stopped

  services-healthcheck:
    image: busybox:latest
    container_name: agent-services-healthcheck
    networks:
      - agent-net
    depends_on:
      qdrant:
        condition: service_healthy
      postgres:
        condition: service_healthy
      rag:
        condition: service_healthy
    command: >
      /bin/sh -c "
      echo 'Core services healthy (qdrant, postgres, rag). Agent + viewer are soft-gated.' &&
      touch /tmp/healthy &&
      sleep infinity
      "
    healthcheck:
      test: ["CMD-SHELL", "[ -f /tmp/healthy ] && echo ok"]
      interval: 10s
      timeout: 5s
      retries: 3
