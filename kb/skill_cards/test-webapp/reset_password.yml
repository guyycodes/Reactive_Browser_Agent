# Skill card: reset_password (test-webapp, Week-2b foundation)
#
# Destructive reset for a locked user. Matches the hardcoded Jane flow
# currently in runDryRunStep + runExecuteStep (triage.ts); week2b-runtime
# commit replaces the hardcode with skill-card-driven dispatch.
schemaVersion: "1"
app: test-webapp
base_url: http://test-webapp:3000
auth:
  strategy: cookie_session

skills:
  - name: reset_password
    description: >-
      Reset a locked user's password. Unlocks the account as a side effect
      (test-webapp seeds users with status=locked; a successful reset flips
      status to active and stamps last_password_reset_at).
    destructive: true
    inputs:
      email:
        type: email
        required: true
        description: The target user's email address to reset.
      operator_email:
        type: email
        required: true
        description: Tier-1 operator's email (used for session login).
    preconditions:
      - The operator has valid credentials for the admin portal.
      - The target user exists in the seeded users table.
    postconditions:
      # week2d Part 3c scaffold-content fix — postconditions now reference
      # evidence observable from the reset-confirmation page where execute
      # lands post-click (previously referenced last_password_reset_at
      # timestamp which is only visible on /users/<id>). The old
      # pre-3c verifyStep's /verified/i regex hallucinated success against
      # any DOM; the new structured verify requires specific observable
      # evidence from the current snapshot.
      - A "Password reset successful" heading or toast is visible on the reset-confirmation page.
      - A temporary password is displayed on the reset-confirmation page (monospace block, pattern like "Temp-XXX123").
      - A "Back to user" or equivalent navigation link is present on the reset-confirmation page.
    steps:
      - tool: navigate
        args:
          url: "/login"
        description: Open the admin portal login page.
      - tool: fillForm
        args:
          fields:
            - name: Email
              value: "{{ inputs.operator_email }}"
            - name: Password
              value: demo
      - tool: click
        args:
          element: "Sign in button"
      - tool: navigate
        args:
          url: "/users"
      - tool: fillForm
        args:
          fields:
            - name: Search users
              value: "{{ inputs.email }}"
      - tool: click
        args:
          element: "Search button"
      - tool: click
        args:
          element: "{{ inputs.email }} link"
      - tool: click
        args:
          element: "Reset password link"
      - tool: click
        args:
          element: "I confirm checkbox"
      - tool: click
        args:
          element: "Reset password button"
        destructive: true
      - tool: takeScreenshot
        args:
          label: "after-reset"
    rollback: []
