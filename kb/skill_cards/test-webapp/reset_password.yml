# Skill card: reset_password (test-webapp, Week-2b foundation)
#
# Destructive reset for a locked user. Matches the hardcoded Jane flow
# currently in runDryRunStep + runExecuteStep (triage.ts); week2b-runtime
# commit replaces the hardcode with skill-card-driven dispatch.
schemaVersion: "1"
app: test-webapp
base_url: http://test-webapp:3000
auth:
  strategy: cookie_session

skills:
  - name: reset_password
    description: >-
      Reset a locked user's password. Unlocks the account as a side effect
      (test-webapp seeds users with status=locked; a successful reset flips
      status to active and stamps last_password_reset_at).
    destructive: true
    inputs:
      email:
        type: email
        required: true
        description: The target user's email address to reset.
      operator_email:
        type: email
        required: true
        description: Tier-1 operator's email (used for session login).
    preconditions:
      - The operator has valid credentials for the admin portal.
      - The target user exists in the seeded users table.
    postconditions:
      - The target user's status is 'active'.
      - The target user's last_password_reset_at timestamp is within the last 60 seconds.
      - A "Password reset successful" toast is visible on the reset page.
    steps:
      - tool: navigate
        args:
          url: "/login"
        description: Open the admin portal login page.
      - tool: fillForm
        args:
          fields:
            - name: Email
              value: "{{ inputs.operator_email }}"
            - name: Password
              value: demo
      - tool: click
        args:
          element: "Sign in button"
      - tool: navigate
        args:
          url: "/users"
      - tool: fillForm
        args:
          fields:
            - name: Search
              value: "{{ inputs.email }}"
      - tool: click
        args:
          element: "View link on target user row"
      - tool: click
        args:
          element: "Reset password link on user detail"
      - tool: click
        args:
          element: "confirm checkbox for destructive reset"
      - tool: click
        args:
          element: "Reset password submit button"
      - tool: takeScreenshot
        args:
          label: "after-reset"
    rollback: []
